<svg viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="CTO Skill — 你不缺 idea，你缺一个把 idea 想清楚的人">
  <defs>
    <radialGradient id="heroBg" cx="50%" cy="38%" r="75%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="55%"  stop-color="#FAFAFA"/>
      <stop offset="100%" stop-color="#F0F0F2"/>
    </radialGradient>

    <linearGradient id="heroRb" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#8B5CF6"/>
      <stop offset="33%"  stop-color="#EC4899"/>
      <stop offset="66%"  stop-color="#F97316"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>

    <radialGradient id="heroHaloPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#EC4899" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="heroHaloAmber" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FBBF24" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FBBF24" stop-opacity="0"/>
    </radialGradient>

    <filter id="heroSoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1280" height="640" fill="url(#heroBg)"/>

  <!-- ribbon 投出的色光晕 (双色, 极淡) -->
  <ellipse cx="540" cy="220" rx="280" ry="120" fill="url(#heroHaloPink)"/>
  <ellipse cx="760" cy="220" rx="280" ry="120" fill="url(#heroHaloAmber)"/>

  <!-- Eyebrow -->
  <text x="640" y="68" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, monospace"
        font-size="11" letter-spacing="6" font-weight="500" fill="#86868B">
    BUILT FOR CLAUDE CODE  ·  v1.0
  </text>
  <line x1="608" y1="86" x2="672" y2="86" stroke="#D2D2D7" stroke-width="1"/>

  <!-- Logo -->
  <g transform="translate(575, 130)">
    <path d="M 35 65 C 60 65 60 135 100 135 S 140 65 165 65"
          stroke="url(#heroRb)" stroke-width="38" fill="none"
          stroke-linecap="round" opacity="0.32" filter="url(#heroSoft)"/>
    <path d="M 35 65 C 60 65 60 135 100 135 S 140 65 165 65"
          stroke="url(#heroRb)" stroke-width="22" fill="none"
          stroke-linecap="round"/>
  </g>

  <!-- 主标题 -->
  <text x="640" y="385" text-anchor="middle"
        font-family="-apple-system, 'SF Pro Display', 'PingFang SC', 'Helvetica Neue', sans-serif"
        font-size="108" font-weight="700" letter-spacing="-4" fill="#1D1D1F">CTO Skill</text>

  <!-- Tagline -->
  <text x="640" y="470" text-anchor="middle"
        font-family="-apple-system, 'PingFang SC', 'Hiragino Sans GB', sans-serif"
        font-size="32" font-weight="500" letter-spacing="-0.3" fill="#1D1D1F">你不缺 idea。</text>
  <text x="640" y="515" text-anchor="middle"
        font-family="-apple-system, 'PingFang SC', 'Hiragino Sans GB', sans-serif"
        font-size="32" font-weight="500" letter-spacing="-0.3" fill="#6E6E73">你缺一个把 idea 想清楚的人。</text>

  <!-- 底部副标题 -->
  <text x="640" y="595" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', monospace"
        font-size="12" letter-spacing="4" fill="#86868B">
    一场对话  ·  想清楚再让 AI 开工
  </text>
</svg>
